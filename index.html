<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>条文サンプル切替（lawshock1）</title>

  <!-- PWA対応 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Yu Gothic", sans-serif;
      padding: 20px;
      background: #f4f6f8;
    }

    h2 {
      color: #2c3e50;
    }

    button {
      margin: 5px;
      padding: 10px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .box {
      border: 1px solid #ccc;
      padding: 12px;
      margin-top: 10px;
      background: white;
      border-radius: 6px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>条文サンプル選択</h2>

<button onclick="showLaw('A')">サンプル A</button>
<button onclick="showLaw('B')">サンプル B</button>

<div class="box">
  <h3>条文</h3>
  <pre id="lawDisplay">ここに条文が表示されます</pre>
</div>

<div class="box">
  <h3>条文の趣旨（自動説明）</h3>
  <textarea id="lawSummary" placeholder="ここに条文の説明が表示されます"></textarea>
</div>

<script src="app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
